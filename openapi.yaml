openapi: 3.1.0
info:
  title: NEWDB API
  version: 1.0.0
  description: 'OpenAPI-спецификация, собранная по локальной markdown-документации NEWDB и сверенная с public.spiders_yandex
    для project=allspiders, а также для комплексных методов project=complex.

    Основной интерфейс работает через `POST /v2` с переключением поведения по `params.method`.

    Для части методов детальные схемы ответов не раскрыты полностью, поэтому ответы описаны общими envelope-схемами и примерами.'
servers:
- url: https://api.newdb.net
security:
- ApiKeyAuth: []
tags:
- name: Service
- name: Physical Persons
- name: Legal Entities
- name: Foreign Citizens
- name: Justice
- name: Property
paths:
  /v2:
    post:
      tags:
      - Service
      summary: Отправить асинхронный запрос NEWDB
      description: 'Универсальная точка входа для асинхронных запросов NEWDB.

        Конкретный бизнес-метод выбирается по `params.method`.'
