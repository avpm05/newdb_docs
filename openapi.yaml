      responses:
        '200':
          description: Запрос принят или возвращён ранее сохранённый результат
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncEnvelope'
  /v2/data:
    get:
      tags:
      - Service
      summary: Получить результат по requestId
      operationId: getRequestData
      security:
      - QueryToken: []
      parameters:
      - in: query
        name: requestId
        required: true
        schema:
          type: string
          format: uuid
      - in: query
        name: token
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Текущее состояние запроса и результаты
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncEnvelope'
  /v2/run:
    get:
      tags:
      - Service
      summary: Синхронный запуск метода с ожиданием результата
      description: 'Помимо перечисленных параметров принимает метод-специфичные query-поля в зависимости от `method`,

        например `seria`, `number`, `inn`, `innfiz`, `query`, `act_text` и другие.'
      operationId: runSyncMethod
      security:
      - QueryToken: []
      parameters:
      - in: query
        name: method
        required: true
        schema:
          type: string
          enum:
          - fssp_person
          - passport_fns
          - passport_mvd
          - bankrot_person
          - pledge_person
          - arbitr_person
          - nalog_debt
          - elmk_registry
          - fns_block_person
          - egrul_ip
          - terrorist
          - foreign_vng
          - foreign_patent
          - foreign_rvp_stamp
          - foreign_rvp_blank
          - foreign_rnr
          - rkl
          - patent_msk
          - patent_mo
          - arbitr_legal
          - fns_block
          - bankrot_legal
          - egrul
          - fssp_legal
          - pravo_search
          - act_text_search
          - pravo_cases_details
          - rosreestr
          - pledge_property
          - pledge_vin
          - nspd_cadastr
          - realty_price
          - arbitr_case
          - pledge_legal
          - complex_by_passport
          - complex_by_inn
          - complex_by_innfiz
      - in: query
        name: country
        required: true
        schema:
          type: string
          example: ru
      - in: query
        name: token
        required: true
        schema:
          type: string
      - in: query
        name: requestId
        required: false
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Результат синхронного выполнения или таймаут
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/RunCompleteResponse'
                - $ref: '#/components/schemas/RunTimeoutResponse'
  /v2/balance:
    get:
      tags:
      - Service
      summary: Проверить баланс токена
      operationId: getBalance
      responses:
        '200':
          description: Баланс токена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceResponse'
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-KEY
    QueryToken:
      type: apiKey
      in: query
      name: token
  schemas:
    GenericTaskResult:
      type: object
      properties:
        taskId:
          type: string
          format: uuid
        dateupdated:
          type: string
        result:
          type: object
          properties:
            status:
              type: integer
              example: 200
            data:
              type: array
              items:
                type: object
                additionalProperties: true
            meta:
              type: object
              additionalProperties: true
          additionalProperties: true
      additionalProperties: true
    AsyncEnvelope:
      type: object
      properties:
        params:
          type: object
          additionalProperties: true
        requestId:
          type: string
          format: uuid
        datecreated:
          type: string
        state:
          type: string
          enum:
          - pending
          - processing
          - complete
          - timeout
          - error
        balance:
          type: integer
        tasks:
          type: integer
        is_repeat:
          type: boolean
        error:
          type: string
        results:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/GenericTaskResult'
      additionalProperties: true
    RunCompleteResponse:
      type: object
      properties:
        requestId:
          type: string
          format: uuid
        state:
          type: string
          enum:
          - complete
        results:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/GenericTaskResult'
      required:
      - requestId
      - state
      - results
    RunTimeoutResponse:
      type: object
      properties:
        requestId:
          type: string
          format: uuid
        state:
          type: string
          enum:
          - timeout
        error:
          type: string
          example: Task execution timeout
      required:
      - requestId
      - state
      - error
    BalanceResponse:
      type: object
      properties:
        token:
          type: string
          format: uuid
        balance:
          type: integer
      required:
      - token
      - balance
    fssp_personRequest:
      type: object
      description: 'fssp_person — Проверка ФЛ по базе ФССП. Источник: docs/fiz/01-fssp_person.md.'
      properties:
        params:
          type: object
          properties:
            firstname:
              type: string
              example: ДМИТРИЙ
            lastname:
              type: string
              example: КОНЕВ
            secondname:
              type: string
              example: СЕРГЕЕВИЧ
            dob:
              type: string
              format: date
              example: '1986-10-10'
            regioncode:
              type: integer
              example: 77
            country:
              type: string
              example: ru
            method:
              type: string
              enum:
              - fssp_person
              example: fssp_person
          required:
          - firstname
          - lastname
          - secondname
          - dob
          - regioncode
          - country
          - method
          additionalProperties: true
        requestId:
          type: string
          format: uuid
        webhook:
          type: string
          format: uri
        taskId:
          type: string
      required:
      - params
      additionalProperties: false
      example:
        params:
