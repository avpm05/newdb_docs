      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
              - $ref: '#/components/schemas/fssp_personRequest'
              - $ref: '#/components/schemas/passport_fnsRequest'
              - $ref: '#/components/schemas/passport_mvdRequest'
              - $ref: '#/components/schemas/complex_by_passportRequest'
              - $ref: '#/components/schemas/complex_by_innRequest'
              - $ref: '#/components/schemas/complex_by_innfizRequest'
              - $ref: '#/components/schemas/bankrot_personRequest'
              - $ref: '#/components/schemas/pledge_personRequest'
              - $ref: '#/components/schemas/arbitr_personRequest'
              - $ref: '#/components/schemas/nalog_debtRequest'
              - $ref: '#/components/schemas/elmk_registryRequest'
              - $ref: '#/components/schemas/fns_block_personRequest'
              - $ref: '#/components/schemas/egrul_ipRequest'
              - $ref: '#/components/schemas/terroristRequest'
              - $ref: '#/components/schemas/foreign_vngRequest'
              - $ref: '#/components/schemas/foreign_patentRequest'
              - $ref: '#/components/schemas/foreign_rvp_stampRequest'
              - $ref: '#/components/schemas/foreign_rvp_blankRequest'
              - $ref: '#/components/schemas/foreign_rnrRequest'
              - $ref: '#/components/schemas/rklRequest'
              - $ref: '#/components/schemas/patent_mskRequest'
              - $ref: '#/components/schemas/patent_moRequest'
              - $ref: '#/components/schemas/arbitr_legalRequest'
              - $ref: '#/components/schemas/arbitr_caseRequest'
              - $ref: '#/components/schemas/fns_blockRequest'
              - $ref: '#/components/schemas/bankrot_legalRequest'
              - $ref: '#/components/schemas/egrulRequest'
              - $ref: '#/components/schemas/fssp_legalRequest'
              - $ref: '#/components/schemas/pravo_searchRequest'
              - $ref: '#/components/schemas/act_text_searchRequest'
              - $ref: '#/components/schemas/pravo_cases_detailsRequest'
              - $ref: '#/components/schemas/rosreestrRequest'
              - $ref: '#/components/schemas/pledge_propertyRequest'
              - $ref: '#/components/schemas/pledge_legalRequest'
              - $ref: '#/components/schemas/pledge_vinRequest'
              - $ref: '#/components/schemas/nspd_cadastrRequest'
              - $ref: '#/components/schemas/realty_priceRequest'
            examples:
              fssp_person:
                summary: fssp_person — Проверка ФЛ по базе ФССП
                value:
                  params:
                    firstname: ДМИТРИЙ
                    lastname: КОНЕВ
                    secondname: СЕРГЕЕВИЧ
                    dob: '1986-10-10'
                    country: ru
                    method: fssp_person
                    regioncode: 77
                  webhook: https://newer.net/whook
                  requestId: 3122f8c9-08ff-429a-8550-54ca099e3111
              passport_fns:
                summary: passport_fns — Проверка  паспорта/ИНН через ФНС
